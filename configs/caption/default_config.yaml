exp:
  seed: 42
  name: default
  rank: 0
  ngpus_per_node: 1
  world_size: 1
  checkpoint: "${oc.env:KTVIC_CAPTION_CHECKPOINT,}"
  eval: False
  resume: False
  resume_checkpoint: '${oc.env:KTVIC_RESUME_CHECKPOINT,""}'
  eval_checkpoint: '${oc.env:KTVIC_EVAL_CHECKPOINT,""}'
  auto_resume_latest: false
  phase_plan: "${oc.env:KTVIC_PHASE_PLAN,xe_only}"
  selection_split: "${oc.env:KTVIC_SELECTION_SPLIT,valid}"
  training_regime: "full_xe"
  init_mode: "full_model"
  scst_seed_checkpoint: '${oc.env:KTVIC_SCST_SEED_CHECKPOINT,""}'
  max_train_batches: 0
  stop_after_train_epoch: false
  preflight_only: false
  write_trace: true
  trace_every_n_steps: 20
  run_dir: outputs/${exp.name}

dataset:
  overfit: False
  max_train_items: 0
  max_valid_items: 0
  max_test_items: 0
  ann_root: "${oc.env:DATA_ROOT}/annotations"
  img_root: "${oc.env:DATA_ROOT}"
  hdf5_path: "${oc.env:DATA_ROOT}/all_splits.h5"
  vocab_path: "${oc.env:DATA_ROOT}/annotations/vocab.json"
  use_gri_feat: ${model.use_gri_feat}
  use_reg_feat: ${model.use_reg_feat}

 
 
 
  split_mode: "full"
  dev_split: "seed42_valid10"

  transform_cfg:
    size: [384, 640]
    resize_name: maxwh
    randaug: True

model:
  use_gri_feat: True
  use_reg_feat: True
  grid_feat_dim: 1024
  frozen_stages: 2
  beam_size: 5
  beam_len: 20
  dropout: 0.2
  attn_dropout: 0.2

  vocab_size: 10201
  max_len: 54
  pad_idx: 1
  bos_idx: 2
  eos_idx: 3
  d_model: 512
  n_heads: 8

  grid_net:
    n_memories: 1
    n_layers: 3

  cap_generator:
    decoder_name: parallel
    n_layers: 3

  detector:
    checkpoint: ""
    d_model: 512
    dim_feedforward: 1024
    num_heads: 8
    num_layers: 6
    num_levels: 4
    num_points: 4
    num_queries: 150
    num_classes: 1849
    dropout: 0.1
    activation: "relu"
    return_intermediate: True
    with_box_refine: True

optimizer:
  warmup_init_lr: 5e-6
  min_lr: 5e-6
  xe_lr: 5e-6
  sc_lr: 5e-6
  xe_backbone_lr: 5e-6
  sc_backbone_lr: 5e-6
  xe_detector_lr: 5e-6
  sc_detector_lr: 5e-6
  weight_decay: 0.01
  beta_1: 0.9
  beta_2: 0.99
  batch_size: 16
  num_workers: 2
  freezing_xe_epochs: 0
  freezing_sc_epochs: 0
  finetune_xe_epochs: 10
  finetune_sc_epochs: 0
  freeze_detector: False
  freeze_backbone: False
  freeze_grid: False
 
  ext_lr: 5.0e-5
  freeze_grit: False
  grad_clip: 0.1

tracking:
  use_mlflow: true
  use_wandb: false
  project_name: "ktvic-baseline3"
  run_name: "grit-default-baseline3"
  run_name_suffix: '${oc.env:TRACKING_RUN_NAME_SUFFIX,""}'
  use_run_dir_name_suffix: true
  mlflow_tracking_uri: '${oc.env:MLFLOW_TRACKING_URI,""}'
  mlflow_registry_uri: '${oc.env:MLFLOW_REGISTRY_URI,""}'
  mlflow_experiment_name: '${oc.env:MLFLOW_EXPERIMENT_NAME,""}'
  mlflow_artifact_location: '${oc.env:MLFLOW_ARTIFACT_LOCATION,""}'
  enable_mlflow_model_registry: false
  mlflow_registered_model_name: '${oc.env:MLFLOW_REGISTERED_MODEL_NAME,""}'
  mlflow_registered_model_alias: '${oc.env:MLFLOW_REGISTERED_MODEL_ALIAS,""}'
  mlflow_model_registration_await_secs: 300
  wandb_project_name: '${oc.env:WANDB_PROJECT,""}'
  wandb_entity: '${oc.env:WANDB_ENTITY,""}'
  wandb_group: '${oc.env:WANDB_GROUP,""}'
  wandb_job_type: "${oc.env:WANDB_JOB_TYPE,baseline3}"
  wandb_tags_csv: '${oc.env:WANDB_TAGS,""}'
  wandb_dir: '${oc.env:WANDB_DIR,""}'
  step_metrics_every_n_steps: 5
  enable_system_metrics: true
  system_metrics_sampling_interval_sec: 10
  system_metrics_samples_before_logging: 1
  enable_nvidia_smi_metrics: true
  log_gradient_norm: true
  sample_table_size_per_split: 4
  sample_table_batch_size: 4
  checkpoint_missing_key_alert_threshold: 0
  checkpoint_unexpected_key_alert_threshold: 0
  loss_plateau_epochs: 3
  loss_plateau_min_delta: 1e-4
  caption_truncation_min_tokens: 3
  caption_truncation_alert_rate: 0.25
  unk_alert_rate: 0.10
  duplicate_ngram_alert_rate: 0.25
  empty_caption_alert_rate: 0.10
  vietnamese_diacritic_min_rate: 0.30
  gpu_memory_alert_utilization: 0.95

# ===  module schema (disabled by default → default_config reproduces plain GRIT) ===
# Enabled per stage via  run overrides: S1=rrm, S2=lcqm, S3=modulator (_03 rollout).
model_ext:
  rrm:
    enabled: false
    n_layers: 1
    n_heads: 8
    d_p: 64
    phi_geo_dim: 10
    lambda_geo: 1.0
    lambda_vis: 1.0
    alpha_rel_init: 0.0
    gate_bias_init: -5.0
    geo_mlp_hidden: 128
    dropout: 0.2
    use_trigonometric_embedding: false
    trig_wave_len: 1000
    use_sqrt3_norm: false
  lcqm:
    enabled: false
    k_loc: 16
    n_layers: 1
    n_heads: 8
    use_rel_input: false
    stop_grad_rel: false
    type_emb_std: 0.02
    slot_init_std: 0.02
    out_scale: 0.01
    beta_loc_init: 0.0
    gate_bias_init: -1.0
    gate_bias_start: -5.0
    gate_bias_end: -1.0
    gate_schedule_epochs: 5
    lambda_gate: 0.0
    gate_target_openness: 0.1
    use_heuristic_bias: false
    heuristic_step_size: 0.01
    b_m: -5.0
    modulator:
      enabled: false
      b_eta: -3.0
  fusion:
    beta_rel_init: 0.0
loss_ext:
  lambda_loc: 0.5
  lambda_route: 0.1
  lambda_div: 0.01
  tau: 0.07
  warmup_epochs: 2
  ramp_epochs: 3
  eps: 1.0e-8

hydra:
  run:
    dir: ${exp.run_dir}
  output_subdir: ./
  job:
    config:
      override_dirname:
        exclude_keys:
          - exp.name
